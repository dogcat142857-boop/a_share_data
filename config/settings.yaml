# A股个股数据维护配置

storage:
  root: data
  daily_dir: daily          # 个股日线：data/daily/{code}.parquet
  meta_dir: meta            # 股票列表、交易日历等
  raw_dir: raw              # 原始抓取备份（可选）

fetch:
  # 数据源：akshare（免费，无需 token）
  source: akshare
  # 日线起始日期（YYYYMMDD）；已有本地数据时会自动增量续写
  default_start: "20100101"
  # 单次请求间隔（秒），降低被限流概率
  request_pause: 0.35
  # 失败重试次数
  max_retries: 3
  retry_pause: 2.0

universe:
  # all = 全市场 A 股；也可改为 watchlist 文件路径（相对仓库根目录）
  mode: all
  watchlist: config/watchlist.txt

update:
  # 更新日线时跳过已是最新交易日的股票
  skip_if_fresh: true

# 问财补全 VOLAMOUNT（总笔数 / 成交笔数）
wencai:
  enabled: true
  # Cookie 优先读环境变量（推荐写在仓库根目录 .env，勿提交）
  cookie_env: WENCAI_COOKIE
  cookie: ""
  # 问句模板；可用 {Y}{m}{d} / {YYYYMMDD} / {YYYY-MM-DD}
  query_template: "{Y}年{m}月{d}日A股成交笔数"
  loop: true                 # 翻完全部分页，拿全市场
  page_sleep: 0.4            # 分页间隔（秒）；全量回填可略降，过高易封
  day_pause: 0.8             # 交易日之间的间隔
  max_retries: 3
  retry_pause: 2.0
  merge_into_daily: true     # 日更时写入 daily；全量回填脚本会先只抓 raw
  # sync_all 日更时默认补最近 N 个交易日（防漏）
  daily_days: 1
  # 全量回填起点（YYYYMMDD）
  backfill_start: "20100101"
